name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    types: [opened, synchronize]

  workflow_dispatch:

  # to execute once a day (more info see https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#schedule )
  schedule:
    - cron: "0 0 * * *"

jobs:
  build:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, windows-2022, windows-2025]
        # Node versions match Ubuntu LTS defaults:
        # 18 = Ubuntu 24.04, 20 = Ubuntu 25.x, 22 = Ubuntu 26.04
        node: [18, 20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        # version is read from packageManager in package.json

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Test
        run: pnpm test

  codeQuality:
    name: Code quality
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository
    needs: [build]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        # version is read from packageManager in package.json

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check format
        run: pnpm format || (pnpm format-fix; git diff; echo "Formatting did not match (see above diff), please run 'pnpm format-fix'" >&2 && exit 1)

      - name: Lint
        run: pnpm lint

  nodeJsBaselineAptCompatibility:
    name: NodeJS installed from stock Ubuntu-LTS packages (not external sources)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-24.04
    container:
      image: "ubuntu:24.04"
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          apt update --yes

          # NOTE: do not change the below with an `actions/setup-node` step! or it
          # would make this CI job entirely pointless
          apt install --yes npm

          npm install --global pnpm
          pnpm install

      - name: Print versions
        run: node --version && npm --version && pnpm --version

      - name: Build
        run: pnpm build

      - name: Run Tests
        run: pnpm test
